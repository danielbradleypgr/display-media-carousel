<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fullscreen Image Carousel</title>

  <style>
    /* Reset */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    }

    /* Carousel Container */
    .carousel {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    /* Track */
    .carousel-track {
      display: flex;
      height: 100%;
      transition: transform 0.6s ease-in-out;
      will-change: transform;
    }

    /* Slides */
    .carousel-slide {
      min-width: 100%;
      height: 100%;
      position: relative;
    }

    .carousel-slide img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* Navigation Buttons */
    .carousel-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(0, 0, 0, 0.4);
      border: none;
      color: white;
      font-size: 2rem;
      padding: 0.5rem 1rem;
      cursor: pointer;
      z-index: 10;
      transition: background 0.2s ease;
    }

    .carousel-btn:hover {
      background: rgba(0, 0, 0, 0.6);
    }

    .carousel-btn.prev {
      left: 1rem;
    }

    .carousel-btn.next {
      right: 1rem;
    }

    /* Dots */
    .carousel-dots {
      position: absolute;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 0.5rem;
      z-index: 10;
    }

    .carousel-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.5);
      cursor: pointer;
      transition: background 0.2s ease;
    }

    .carousel-dot.active {
      background: white;
    }
  </style>
</head>
<body>

  <div class="carousel" id="carousel">
    <div class="carousel-track">
      <div class="carousel-slide">
        <img src="https://picsum.photos/id/1015/1920/1080" alt="Slide 1">
      </div>
      <div class="carousel-slide">
        <img src="https://picsum.photos/id/1016/1920/1080" alt="Slide 2">
      </div>
      <div class="carousel-slide">
        <img src="https://picsum.photos/id/1018/1920/1080" alt="Slide 3">
      </div>
    </div>

    <button class="carousel-btn prev" aria-label="Previous slide">‹</button>
    <button class="carousel-btn next" aria-label="Next slide">›</button>

    <div class="carousel-dots"></div>
  </div>

  <script>
    const carousel = document.getElementById('carousel');
    const track = carousel.querySelector('.carousel-track');
    const slides = Array.from(track.children);
    const prevBtn = carousel.querySelector('.prev');
    const nextBtn = carousel.querySelector('.next');
    const dotsContainer = carousel.querySelector('.carousel-dots');

    let currentIndex = 0;
    let startX = 0;
    let isDragging = false;
    const autoPlayInterval = 6000;
    let autoPlayTimer;

    /* Create dots */
    slides.forEach((_, index) => {
      const dot = document.createElement('div');
      dot.classList.add('carousel-dot');
      if (index === 0) dot.classList.add('active');
      dot.addEventListener('click', () => goToSlide(index));
      dotsContainer.appendChild(dot);
    });

    const dots = Array.from(dotsContainer.children);

    function updateCarousel() {
      track.style.transform = `translateX(-${currentIndex * 100}%)`;
      dots.forEach(dot => dot.classList.remove('active'));
      dots[currentIndex].classList.add('active');
    }

    function goToSlide(index) {
      currentIndex = (index + slides.length) % slides.length;
      updateCarousel();
      resetAutoplay();
    }

    function nextSlide() {
      goToSlide(currentIndex + 1);
    }

    function prevSlide() {
      goToSlide(currentIndex - 1);
    }

    /* Buttons */
    nextBtn.addEventListener('click', nextSlide);
    prevBtn.addEventListener('click', prevSlide);

    /* Keyboard */
    document.addEventListener('keydown', e => {
      if (e.key === 'ArrowRight') nextSlide();
      if (e.key === 'ArrowLeft') prevSlide();
    });

    /* Touch / Swipe */
    carousel.addEventListener('touchstart', e => {
      startX = e.touches[0].clientX;
      isDragging = true;
    });

    carousel.addEventListener('touchend', e => {
      if (!isDragging) return;
      const endX = e.changedTouches[0].clientX;
      const diff = startX - endX;
      if (diff > 50) nextSlide();
      if (diff < -50) prevSlide();
      isDragging = false;
    });

    /* Autoplay */
    function startAutoplay() {
      autoPlayTimer = setInterval(nextSlide, autoPlayInterval);
    }

    function resetAutoplay() {
      clearInterval(autoPlayTimer);
      startAutoplay();
    }

    startAutoplay();
  </script>

</body>
</html>
